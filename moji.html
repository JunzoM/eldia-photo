<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ELDIA Scanner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:#0e0f11;color:#e8eaf0;min-height:100dvh;display:flex;flex-direction:column}
header{padding:14px 16px;background:#16181c;border-bottom:1px solid #2a2d35;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:30px;height:30px;background:#4fffb0;border-radius:7px;display:grid;place-items:center;font-weight:900;font-size:10px;color:#000}
h1{font-size:15px;font-weight:600}
.apibar{background:#16181c;border-bottom:1px solid #2a2d35;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.apibar-row{display:flex;gap:8px;align-items:center}
.apibar input{flex:1;background:#0e0f11;border:1px solid #2a2d35;border-radius:8px;padding:8px 12px;color:#e8eaf0;font-size:13px;outline:none;font-family:monospace}
.apibar input:focus{border-color:#4fffb0}
.apibar input::placeholder{color:#6b7080}
.api-save{background:#4fffb0;color:#000;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer}
.api-save.saved{background:#2a2d35;color:#4fffb0}
.api-status{font-size:12px;color:#6b7080}
.api-status.ok{color:#4fffb0}
.api-status.err{color:#ff8fa0}
main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.capture{position:relative;background:#16181c;border-bottom:1px solid #2a2d35;min-height:200px;display:flex;align-items:center;justify-content:center;overflow:hidden}
#videoEl{width:100%;max-height:280px;object-fit:cover;display:none}
#previewEl{width:100%;max-height:280px;object-fit:contain;display:none;background:#000}
.idle{display:flex;flex-direction:column;align-items:center;gap:12px;padding:32px 16px;color:#6b7080;text-align:center;font-size:13px}
.frame{position:absolute;inset:0;pointer-events:none;display:none}
.frame.on{display:block}
.frame::before,.frame::after,.frame .br,.frame .bl{content:'';position:absolute;width:24px;height:24px;border-color:#4fffb0;border-style:solid}
.frame::before{top:12px;left:12px;border-width:2px 0 0 2px}
.frame::after{top:12px;right:12px;border-width:2px 2px 0 0}
.frame .br{bottom:12px;right:12px;border-width:0 2px 2px 0}
.frame .bl{bottom:12px;left:12px;border-width:0 0 2px 2px}
.overlay{position:absolute;inset:0;background:rgba(14,15,17,.85);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;backdrop-filter:blur(4px);z-index:10}
.overlay.on{display:flex}
.spin{width:36px;height:36px;border:3px solid #2a2d35;border-top-color:#4fffb0;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-txt{font-size:12px;color:#aaa}
.controls{display:flex;gap:8px;padding:12px 14px;background:#16181c;border-bottom:1px solid #2a2d35;flex-shrink:0}
.btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 8px;border-radius:11px;font-size:13px;font-family:inherit;cursor:pointer;border:none}
.btn-p{background:#4fffb0;color:#000;font-weight:600}
.btn-p:disabled{background:#2a2d35;color:#6b7080;cursor:not-allowed}
.btn-s{background:transparent;color:#e8eaf0;border:1px solid #2a2d35}
.result{flex:1;display:flex;flex-direction:column;min-height:160px}
.result-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #2a2d35;flex-shrink:0}
.result-label{font-size:11px;color:#6b7080;letter-spacing:.08em;text-transform:uppercase}
.char{font-size:11px;color:#6b7080}
textarea{flex:1;width:100%;background:transparent;border:none;outline:none;resize:none;color:#e8eaf0;font-size:14px;line-height:1.9;padding:14px;font-family:inherit}
textarea::placeholder{color:#6b7080;font-size:13px}
.copy-bar{padding:12px 14px;background:#16181c;border-top:1px solid #2a2d35;display:flex;gap:8px;flex-shrink:0}
.err-banner{background:#ff4f6d22;border:1px solid #ff4f6d44;border-radius:10px;padding:10px 14px;font-size:13px;color:#ff8fa0;margin:8px 14px;display:none}
.err-banner.on{display:block}
#canvas,#fileInput{display:none}
</style>
</head>
<body>
<header>
  <div class="logo">OCR</div>
  <h1>ELDIA Scanner</h1>
</header>

<div class="apibar">
  <div class="apibar-row">
    <input type="password" id="apiKeyInput" placeholder="Anthropic APIキー（sk-ant-api03-...）" autocomplete="off">
    <button class="api-save" id="saveBtn">保存</button>
  </div>
  <div class="api-status" id="apiStatus">APIキーを入力してください</div>
</div>

<main>
  <div class="capture">
    <div class="idle" id="idle"><div style="font-size:40px">📷</div><div>カメラまたはファイルで<br>スキャンできます</div></div>
    <video id="videoEl" autoplay playsinline muted></video>
    <img id="previewEl" alt="">
    <div class="frame" id="frame"><div class="br"></div><div class="bl"></div></div>
    <div class="overlay" id="overlay"><div class="spin"></div><div class="ov-txt">OCR 解析中…</div></div>
  </div>
  <div class="err-banner" id="errBanner"></div>
  <div class="controls">
    <button class="btn btn-s" id="btnCam">📷 カメラ</button>
    <button class="btn btn-s" id="btnFile">📁 ファイル</button>
    <button class="btn btn-p" id="btnScan" disabled>🔍 スキャン</button>
  </div>
  <div class="result">
    <div class="result-head">
      <span class="result-label">抽出テキスト</span>
      <span class="char" id="charCount">0 文字</span>
    </div>
    <textarea id="output" placeholder="スキャン結果がここに表示されます…"></textarea>
    <div class="copy-bar">
      <button class="btn btn-p" style="flex:1" id="copyBtn">📋 コピー</button>
      <button class="btn btn-s" style="flex:0 0 auto;padding:11px 16px" id="clearBtn">🗑</button>
    </div>
  </div>
</main>

<canvas id="canvas"></canvas>
<input type="file" id="fileInput" accept="image/*">

<script>
(function() {
  var stream = null, cameraOn = false, currentB64 = null;

  var video    = document.getElementById('videoEl');
  var preview  = document.getElementById('previewEl');
  var idle     = document.getElementById('idle');
  var frame    = document.getElementById('frame');
  var overlay  = document.getElementById('overlay');
  var btnScan  = document.getElementById('btnScan');
  var btnCam   = document.getElementById('btnCam');
  var btnFile  = document.getElementById('btnFile');
  var output   = document.getElementById('output');
  var errBanner= document.getElementById('errBanner');
  var canvas   = document.getElementById('canvas');
  var apiInput = document.getElementById('apiKeyInput');
  var saveBtn  = document.getElementById('saveBtn');
  var apiStatus= document.getElementById('apiStatus');
  var charCount= document.getElementById('charCount');
  var copyBtn  = document.getElementById('copyBtn');
  var clearBtn = document.getElementById('clearBtn');
  var fileInput= document.getElementById('fileInput');

  // ── API Key ──
  saveBtn.addEventListener('click', function() {
    var k = apiInput.value.trim();
    if (!k) {
      apiStatus.className = 'api-status err';
      apiStatus.textContent = '⚠ キーが空です';
      return;
    }
    if (k.indexOf('sk-ant-') !== 0) {
      apiStatus.className = 'api-status err';
      apiStatus.textContent = '⚠ 正しいキーは sk-ant- で始まります';
      return;
    }
    try { localStorage.setItem('eldia_api_key', k); } catch(e) {}
    saveBtn.className = 'api-save saved';
    saveBtn.textContent = '✓ 保存済';
    apiStatus.className = 'api-status ok';
    apiStatus.textContent = '✓ APIキーが保存されました';
  });

  apiInput.addEventListener('input', function() {
    saveBtn.className = 'api-save';
    saveBtn.textContent = '保存';
    apiStatus.className = 'api-status';
    apiStatus.textContent = '変更されました。保存してください';
  });

  function getKey() {
    try { return localStorage.getItem('eldia_api_key') || apiInput.value.trim(); }
    catch(e) { return apiInput.value.trim(); }
  }

  // ── Camera ──
  btnCam.addEventListener('click', function() {
    if (cameraOn) { stopCamera(); } else { startCamera(); }
  });

  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(function(s) {
        stream = s;
        video.srcObject = stream;
        video.style.display = 'block';
        preview.style.display = 'none';
        idle.style.display = 'none';
        frame.classList.add('on');
        cameraOn = true;
        btnCam.textContent = '⏹ 停止';
        currentB64 = null;
        btnScan.disabled = false;
        btnScan.textContent = '📸 撮影';
      })
      .catch(function(e) { showErr('カメラエラー: ' + e.message); });
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(function(t){ t.stop(); }); stream = null; }
    video.style.display = 'none';
    frame.classList.remove('on');
    cameraOn = false;
    btnCam.textContent = '📷 カメラ';
    if (!currentB64) { idle.style.display = 'flex'; btnScan.disabled = true; }
    btnScan.textContent = '🔍 スキャン';
  }

  // ── File ──
  btnFile.addEventListener('click', function() { fileInput.click(); });
  fileInput.addEventListener('change', function(e) {
    var file = e.target.files[0]; if (!file) return;
    stopCamera();
    var reader = new FileReader();
    reader.onload = function(ev) {
      var url = ev.target.result;
      preview.src = url; preview.style.display = 'block';
      idle.style.display = 'none';
      currentB64 = url.split(',')[1];
      btnScan.disabled = false; btnScan.textContent = '🔍 OCR実行';
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  });

  // ── OCR ──
  btnScan.addEventListener('click', function() {
    var key = getKey();
    if (!key || key.indexOf('sk-ant-') !== 0) {
      showErr('APIキーを入力して「保存」してください');
      return;
    }

    var b64 = currentB64;
    if (cameraOn) {
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      var url = canvas.toDataURL('image/jpeg', 0.92);
      b64 = url.split(',')[1];
      preview.src = url; preview.style.display = 'block';
      stopCamera(); idle.style.display = 'none';
    }
    if (!b64) { showErr('画像を選択してください'); return; }

    overlay.classList.add('on');
    btnScan.disabled = true;
    showErr('');

    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-allow-browser': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
            { type: 'text', text: 'この画像のテキストをすべて抽出してください。テキストのみ出力。説明不要。' }
          ]
        }]
      })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) { showErr('APIエラー: ' + data.error.message); return; }
      var text = (data.content||[]).map(function(b){ return b.text||''; }).join('').trim();
      output.value = text || 'テキストが見つかりませんでした';
      charCount.textContent = output.value.length + ' 文字';
    })
    .catch(function(e) { showErr('通信エラー: ' + e.message); })
    .finally(function() {
      overlay.classList.remove('on');
      btnScan.disabled = false;
    });
  });

  output.addEventListener('input', function() {
    charCount.textContent = output.value.length + ' 文字';
  });

  copyBtn.addEventListener('click', function() {
    if (!output.value) return;
    navigator.clipboard.writeText(output.value).then(function() {
      copyBtn.textContent = '✓ コピー完了';
      setTimeout(function(){ copyBtn.textContent = '📋 コピー'; }, 2000);
    });
  });

  clearBtn.addEventListener('click', function() {
    output.value = ''; charCount.textContent = '0 文字';
    preview.style.display = 'none'; currentB64 = null;
    idle.style.display = 'flex'; btnScan.disabled = true;
    showErr('');
  });

  function showErr(msg) {
    errBanner.textContent = msg;
    errBanner.className = msg ? 'err-banner on' : 'err-banner';
  }

  // Restore key
  try {
    var saved = localStorage.getItem('eldia_api_key');
    if (saved) {
      apiInput.value = saved;
      saveBtn.className = 'api-save saved';
      saveBtn.textContent = '✓ 保存済';
      apiStatus.className = 'api-status ok';
      apiStatus.textContent = '✓ APIキーが読み込まれました';
    }
  } catch(e) {}
})();
</script>
</body>
</html>
