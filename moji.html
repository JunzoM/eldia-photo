<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>手書き文字 解析</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #0f0f13;
  font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  color: #f0ede8;
  padding-bottom: 60px;
}
header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid #222;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  background: #0f0f13;
  z-index: 10;
}
header .title { font-size: 17px; font-weight: 700; }
header .sub { font-size: 11px; color: #666; margin-top: 2px; }
main { padding: 20px; max-width: 480px; margin: 0 auto; }

/* APIキーエリア */
.apikey-section {
  background: #151519;
  border: 1px solid #2a2a35;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 20px;
}
.apikey-label { font-size: 11px; color: #666; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 8px; }
.apikey-row { display: flex; gap: 8px; }
.apikey-input {
  flex: 1;
  background: #0f0f13;
  border: 1px solid #333;
  border-radius: 8px;
  color: #f0ede8;
  font-size: 13px;
  padding: 10px 12px;
  font-family: monospace;
  outline: none;
}
.apikey-input:focus { border-color: #4f8ef7; }
.apikey-save {
  padding: 10px 16px;
  background: #1e2a40;
  border: 1px solid #2a4060;
  border-radius: 8px;
  color: #4f8ef7;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
}
.apikey-status { font-size: 11px; color: #7a9a60; margin-top: 8px; }

/* 撮影エリア */
.drop-area {
  border: 2px dashed #333;
  border-radius: 16px;
  padding: 40px 24px;
  text-align: center;
  cursor: pointer;
  background: #151519;
  transition: border-color 0.2s;
}
.drop-area:active { border-color: #4f8ef7; }
.drop-icon { font-size: 44px; margin-bottom: 10px; }
.drop-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.drop-sub { font-size: 12px; color: #555; line-height: 1.6; }

.btn {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 14px 0;
  border-radius: 12px;
  background: #1a1a22;
  border: 1px solid #333;
  color: #aaa;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  text-align: center;
}
.btn-primary {
  background: linear-gradient(135deg, #4f8ef7, #7b5cf5);
  border: none;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  padding: 16px 0;
  border-radius: 14px;
  margin-top: 14px;
}
.btn-ghost {
  background: transparent;
  border: 1px solid #282828;
  color: #555;
  margin-top: 8px;
}

.preview-wrap { position: relative; }
.preview-img { width: 100%; border-radius: 14px; max-height: 360px; object-fit: cover; display: block; border: 1px solid #222; }
.close-btn {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,0,0,0.75); border: none; border-radius: 50%;
  width: 34px; height: 34px; color: #fff; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.spinner-wrap { text-align: center; padding: 32px 0; }
.spinner {
  width: 40px; height: 40px; border-radius: 50%;
  border: 3px solid #333; border-top-color: #4f8ef7;
  animation: spin 0.8s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  margin-top: 14px; padding: 14px 16px;
  background: #1f1215; border: 1px solid #5a2233;
  border-radius: 12px; font-size: 13px; color: #e07090;
  word-break: break-all; line-height: 1.6;
}
.result-card {
  margin-top: 20px; background: #151519;
  border: 1px solid #272730; border-radius: 16px; overflow: hidden;
}
.result-label {
  padding: 12px 16px; border-bottom: 1px solid #222;
  font-size: 11px; color: #666; font-weight: 700; letter-spacing: 0.1em;
}
.result-text { padding: 16px; font-size: 16px; line-height: 1.9; white-space: pre-wrap; }
.note-box {
  margin-top: 10px; background: #131610; border: 1px solid #252a1e;
  border-radius: 12px; padding: 12px 16px; font-size: 12px; color: #7a9a60; line-height: 1.7;
}
.hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <span style="font-size:22px">✍️</span>
  <div>
    <div class="title">手書き文字 解析</div>
    <div class="sub">Powered by Claude Vision</div>
  </div>
</header>

<main>
  <!-- APIキー -->
  <div class="apikey-section">
    <div class="apikey-label">ANTHROPIC API KEY</div>
    <div class="apikey-row">
      <input type="password" class="apikey-input" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
      <button class="apikey-save" onclick="saveKey()">保存</button>
    </div>
    <div class="apikey-status" id="keyStatus">APIキーを入力してください</div>
  </div>

  <!-- hidden inputs -->
  <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
  <input type="file" id="libraryInput" accept="image/*" class="hidden">

  <!-- 選択前 -->
  <div id="selectArea">
    <div class="drop-area" onclick="document.getElementById('cameraInput').click()">
      <div class="drop-icon">📷</div>
      <div class="drop-title">カメラで撮影</div>
      <div class="drop-sub">ノート・メモ・書類などを<br>撮影してください</div>
    </div>
    <button class="btn" onclick="document.getElementById('libraryInput').click()">📁 ライブラリから選択</button>
  </div>

  <!-- プレビュー -->
  <div id="previewArea" class="hidden">
    <div class="preview-wrap">
      <img id="previewImg" class="preview-img" src="" alt="">
      <button class="close-btn" onclick="reset()">✕</button>
    </div>
    <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()">解析する</button>
  </div>

  <!-- ローディング -->
  <div id="loadingArea" class="hidden spinner-wrap">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#666">手書き文字を解析中...</div>
  </div>

  <!-- エラー -->
  <div id="errorArea" class="error-box hidden"></div>

  <!-- 結果 -->
  <div id="resultArea" class="hidden">
    <div class="result-card">
      <div class="result-label">読み取り結果</div>
      <div class="result-text" id="resultText"></div>
    </div>
    <div class="note-box hidden" id="noteBox"></div>
    <button class="btn" onclick="copyText()">📋 テキストをコピー</button>
    <button class="btn btn-ghost" onclick="reset()">もう一度撮影する</button>
  </div>
</main>

<script>
const PROMPT = `この画像に含まれる手書き文字をすべて読み取り、以下の形式で出力してください。

【読み取り結果】
（手書き文字をそのまま忠実に書き起こす。改行や段落構造も維持すること）

【補足】
（読み取りが難しい箇所、不明な文字、注意点があれば記載。問題なければ「特になし」）`;

let base64Data = null;
let mainText = "";
let apiKey = localStorage.getItem("anthropic_key") || "";

// 起動時にキー復元
window.onload = () => {
  if (apiKey) {
    document.getElementById("apiKeyInput").value = apiKey;
    document.getElementById("keyStatus").textContent = "✅ APIキー設定済み";
  }
};

function saveKey() {
  apiKey = document.getElementById("apiKeyInput").value.trim();
  if (!apiKey) return;
  localStorage.setItem("anthropic_key", apiKey);
  document.getElementById("keyStatus").textContent = "✅ APIキー保存済み";
}

function show(id) { document.getElementById(id).classList.remove("hidden"); }
function hide(id) { document.getElementById(id).classList.add("hidden"); }

// ファイル処理
function handleFile(file) {
  if (!file) return;
  base64Data = null;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1024;
      let w = img.width, h = img.height;
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
      else { w = Math.round(w * MAX / h); h = MAX; }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      const jpeg = canvas.toDataURL("image/jpeg", 0.85);
      base64Data = jpeg.split(",")[1];
      document.getElementById("previewImg").src = jpeg;
      hide("selectArea");
      hide("errorArea");
      hide("resultArea");
      show("previewArea");
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById("cameraInput").addEventListener("change", e => handleFile(e.target.files[0]));
document.getElementById("libraryInput").addEventListener("change", e => handleFile(e.target.files[0]));

// 解析
async function analyze() {
  if (!base64Data) return;
  if (!apiKey) {
    show("errorArea");
    document.getElementById("errorArea").textContent = "⚠️ APIキーを入力して「保存」してください";
    return;
  }
  hide("errorArea");
  hide("resultArea");
  document.getElementById("analyzeBtn").disabled = true;
  show("loadingArea");

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01"
      },
      body: JSON.stringify({
        model: "claude-opus-4-6",
        max_tokens: 1024,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64Data } },
            { type: "text", text: PROMPT }
          ]
        }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

    const fullText = (data.content || []).map(b => b.text || "").join("");
    const mainMatch = fullText.match(/【読み取り結果】\n?([\s\S]*?)(?=【補足】|$)/);
    const noteMatch = fullText.match(/【補足】\n?([\s\S]*?)$/);
    mainText = mainMatch?.[1]?.trim() || fullText;
    const note = noteMatch?.[1]?.trim();

    document.getElementById("resultText").textContent = mainText;
    const noteEl = document.getElementById("noteBox");
    if (note && note !== "特になし") {
      noteEl.textContent = "💡 " + note;
      noteEl.classList.remove("hidden");
    } else {
      noteEl.classList.add("hidden");
    }
    show("resultArea");
  } catch (e) {
    show("errorArea");
    document.getElementById("errorArea").textContent = "⚠️ " + e.message;
  } finally {
    hide("loadingArea");
    document.getElementById("analyzeBtn").disabled = false;
  }
}

function reset() {
  base64Data = null;
  mainText = "";
  document.getElementById("previewImg").src = "";
  document.getElementById("cameraInput").value = "";
  document.getElementById("libraryInput").value = "";
  hide("previewArea");
  hide("resultArea");
  hide("errorArea");
  show("selectArea");
}

function copyText() {
  if (!mainText) return;
  navigator.clipboard.writeText(mainText).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = mainText;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  });
}
</script>
</body>
</html>
